<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Scripture Quiz &middot; Truths We Love to Teach</title>
  <meta name="description" content="A multi-player, pass-and-play quiz over the scriptures in 'Truths We Love to Teach' (Appendix A), using the New World Translation Study Edition." />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />

  <!-- Installable web app (Add to Home Screen on Android & iOS) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scripture Quiz" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            serif: ['ui-serif', 'Georgia', 'Cambria', 'Times New Roman', 'serif'],
          },
        },
      },
    };
  </script>
  <style>
    /* Respect iOS safe areas and keep long scripture text scrollable */
    body { -webkit-tap-highlight-color: transparent; }
    .scripture-scroll { scrollbar-width: thin; }
    @keyframes pop { 0% { transform: scale(.96); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop { animation: pop .18s ease-out; }
  </style>
</head>
<body class="h-full bg-slate-100 text-slate-800 font-sans antialiased">
  <div class="mx-auto flex min-h-full max-w-2xl flex-col px-4 pb-8"
       style="padding-top: max(1rem, env(safe-area-inset-top)); padding-bottom: max(2rem, env(safe-area-inset-bottom));">
    <main id="app" class="flex-1"></main>
    <footer id="appFooter" class="mt-8 text-center text-xs text-slate-400">
      Scriptures from the New World Translation Study Edition &middot;
      &ldquo;Truths We Love to Teach&rdquo; (Appendix&nbsp;A)
    </footer>
  </div>
  <script src="data.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script>
    // Register the service worker so the app works offline and is installable.
    if ("serviceWorker" in navigator) {
      // When a newly deployed worker takes control, reload once so the page is
      // running the latest code. Only when the page was already controlled, to
      // avoid a needless reload on the very first visit.
      if (navigator.serviceWorker.controller) {
        var reloadedForUpdate = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (reloadedForUpdate) return;
          reloadedForUpdate = true;
          window.location.reload();
        });
      }
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").then(function (reg) {
          reg.update(); // check for a new worker on every load
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
